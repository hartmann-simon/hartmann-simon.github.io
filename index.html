<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simon Hartmann - Terminal Portfolio</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/jquery.terminal@2.41.1/js/jquery.terminal.min.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/jquery.terminal@2.41.1/css/jquery.terminal.min.css"/>
</head>
<body>
    <div class="container">
        <!-- Header Section -->
        <header class="header">
            <h1 id="headline">Welcome to my terminal... I mean, portfolio</h1>
            <p class="subheadline">Type <span class="highlight">help</span> to get started, or just wing it 🤷</p>
        </header>

        <!-- Terminal Section with iTerm2 Frame -->
        <div class="terminal-wrapper">
            <div class="terminal-titlebar">
                <div class="traffic-lights">
                    <div class="traffic-light close"></div>
                    <div class="traffic-light minimize"></div>
                    <div class="traffic-light maximize"></div>
                </div>
                <div class="terminal-title">simon@portfolio: ~</div>
            </div>
            <div id="terminal"></div>
        </div>

        <!-- Footer Section -->
        <footer class="footer">
            <div class="footer-left">
                <span class="footer-item">© 2026 Simon Hartmann</span>
            </div>
            <div class="footer-right">
                <a href="https://github.com/hartmann-simon" target="_blank" class="footer-link" title="GitHub">
                    <svg width="24" height="24" viewBox="0 0 16 16" fill="currentColor">
                        <path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"/>
                    </svg>
                </a>
                <a href="https://linkedin.com/in/simon-hartmann" target="_blank" class="footer-link" title="LinkedIn">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor">
                        <path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433c-1.144 0-2.063-.926-2.063-2.065 0-1.138.92-2.063 2.063-2.063 1.14 0 2.064.925 2.064 2.063 0 1.139-.925 2.065-2.064 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"/>
                    </svg>
                </a>
            </div>
        </footer>
    </div>

    <!-- Contact Modal -->
    <div id="contactModal" class="contact-modal">
        <div class="contact-window">
            <div class="contact-titlebar">
                <div class="traffic-lights">
                    <div class="traffic-light close" onclick="closeContactModal()"></div>
                    <div class="traffic-light minimize"></div>
                    <div class="traffic-light maximize"></div>
                </div>
                <div class="contact-title">Contact Form</div>
            </div>
            <div class="contact-body" id="contactBody">
                <form id="contactForm">
                    <div class="contact-form-group">
                        <label for="contactName">Name</label>
                        <input type="text" id="contactName" name="name" required placeholder="Your name">
                    </div>
                    <div class="contact-form-group">
                        <label for="contactEmail">Email</label>
                        <input type="email" id="contactEmail" name="email" required placeholder="your.email@example.com">
                    </div>
                    <div class="contact-form-group">
                        <label for="contactMessage">Message</label>
                        <textarea id="contactMessage" name="message" required placeholder="Your message..."></textarea>
                    </div>
                    <div class="contact-checkbox">
                        <input type="checkbox" id="contactCV" name="requestCV">
                        <label for="contactCV">I'd like to request your CV</label>
                    </div>
                    <div class="contact-buttons">
                        <button type="button" class="contact-btn contact-btn-secondary" onclick="closeContactModal()">Cancel</button>
                        <button type="submit" class="contact-btn contact-btn-primary">Send Message</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script src="terminal.js"></script>
</body>
</html>
